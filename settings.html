<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - FloraPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-rose-50 dark:bg-slate-900 min-h-screen flex flex-col items-center py-8 px-4 transition-colors duration-200">
    <div class="w-full max-w-[480px] md:max-w-2xl mx-auto flex-grow flex flex-col">
        <!-- Top Navigation -->
        <div class="w-full flex justify-between items-center mb-6">
            <a href="index.html" class="text-rose-500 hover:text-rose-600 dark:text-rose-400 dark:hover:text-rose-300 font-medium inline-block transition-colors">&larr; Back to Home</a>
            <button onclick="toggleTheme()" class="text-slate-500 hover:text-rose-500 dark:text-slate-400 dark:hover:text-rose-400 transition-colors p-2 rounded-full hover:bg-rose-100/50 dark:hover:bg-slate-800" aria-label="Toggle Dark Mode">
                <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>

        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-rose-500 dark:text-rose-400 mb-2 tracking-tight">Settings</h1>
            <p class="text-slate-600 dark:text-slate-300 font-medium">Customize your experience</p>
        </header>

        <!-- Notifications Card -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-6 border border-rose-100 dark:border-slate-700 mb-8">
            <h2 class="text-xl font-semibold text-slate-800 dark:text-slate-100 mb-4 border-b border-slate-100 dark:border-slate-700 pb-3">Push Notifications</h2>
            
            <div id="permissionSection" class="mb-6 p-4 bg-slate-50 dark:bg-slate-700/50 rounded-xl border border-slate-200 dark:border-slate-600 text-center">
                <p class="text-sm text-slate-600 dark:text-slate-300 mb-3">Enable browser notifications to receive alerts for key cycle events.</p>
                <button id="requestPermBtn" class="bg-slate-800 dark:bg-slate-700 hover:bg-slate-900 dark:hover:bg-slate-600 text-white font-medium py-2 px-4 rounded-lg transition-colors text-sm">
                    Enable Notifications
                </button>
                <p id="permStatus" class="text-xs font-medium mt-2 hidden"></p>
            </div>

            <form id="settingsForm" class="space-y-5 opacity-50 pointer-events-none transition-opacity">
                <label class="flex items-center justify-between cursor-pointer">
                    <div>
                        <p class="font-medium text-slate-800 dark:text-slate-200">Period Reminder</p>
                        <p class="text-xs text-slate-500 dark:text-slate-400">Notify me 1 day before my period starts</p>
                    </div>
                    <div class="relative">
                        <input type="checkbox" id="prefPeriod" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 dark:bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-rose-500 dark:peer-checked:bg-rose-500"></div>
                    </div>
                </label>

                <label class="flex items-center justify-between cursor-pointer">
                    <div>
                        <p class="font-medium text-slate-800 dark:text-slate-200">Ovulation Reminder</p>
                        <p class="text-xs text-slate-500 dark:text-slate-400">Notify me when my fertile window begins</p>
                    </div>
                    <div class="relative">
                        <input type="checkbox" id="prefOvulation" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 dark:bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-rose-500 dark:peer-checked:bg-rose-500"></div>
                    </div>
                </label>

                <button type="submit" class="w-full bg-rose-500 hover:bg-rose-600 dark:bg-rose-600 dark:hover:bg-rose-500 text-white font-medium py-3 px-4 rounded-xl transition-colors mt-4">
                    Save Preferences
                </button>
                <p id="saveMsg" class="text-emerald-600 dark:text-emerald-400 text-sm text-center font-medium hidden mt-2">Preferences saved!</p>
            </form>
        </div>

        <!-- Footer -->
        <footer class="mt-auto text-center pt-8 pb-4">
            <p class="text-xs text-slate-500 dark:text-slate-400 max-w-sm mx-auto leading-relaxed mb-2">
                FloraPulse stores your data locally on your device.
            </p>
            <a href="privacy.html" class="text-xs text-rose-500 hover:text-rose-600 dark:text-rose-400 dark:hover:text-rose-300 transition-colors underline underline-offset-2">Privacy Policy</a>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const requestPermBtn = document.getElementById('requestPermBtn');
            const permStatus = document.getElementById('permStatus');
            const settingsForm = document.getElementById('settingsForm');
            const prefPeriod = document.getElementById('prefPeriod');
            const prefOvulation = document.getElementById('prefOvulation');
            const saveMsg = document.getElementById('saveMsg');

            // Load existing preferences
            const prefs = JSON.parse(localStorage.getItem('notificationPrefs') || '{"period": false, "ovulation": false}');
            prefPeriod.checked = prefs.period;
            prefOvulation.checked = prefs.ovulation;

            function updateUIBasedOnPermission() {
                if (!('Notification' in window)) {
                    permStatus.textContent = "Notifications are not supported by your browser.";
                    permStatus.classList.remove('hidden');
                    permStatus.classList.add('text-red-500');
                    requestPermBtn.classList.add('hidden');
                    return;
                }

                if (Notification.permission === 'granted') {
                    permStatus.textContent = "Notifications are enabled.";
                    permStatus.classList.remove('hidden', 'text-red-500');
                    permStatus.classList.add('text-emerald-600');
                    requestPermBtn.classList.add('hidden');
                    settingsForm.classList.remove('opacity-50', 'pointer-events-none');
                } else if (Notification.permission === 'denied') {
                    permStatus.textContent = "Notifications are blocked by your browser settings.";
                    permStatus.classList.remove('hidden', 'text-emerald-600');
                    permStatus.classList.add('text-red-500');
                    requestPermBtn.classList.add('hidden');
                }
            }

            updateUIBasedOnPermission();

            requestPermBtn.addEventListener('click', () => {
                Notification.requestPermission().then(permission => {
                    updateUIBasedOnPermission();
                });
            });

            settingsForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const newPrefs = {
                    period: prefPeriod.checked,
                    ovulation: prefOvulation.checked
                };
                localStorage.setItem('notificationPrefs', JSON.stringify(newPrefs));
                
                saveMsg.classList.remove('hidden');
                setTimeout(() => {
                    saveMsg.classList.add('hidden');
                }, 3000);
            });
        });
    </script>
</body>
</html>
